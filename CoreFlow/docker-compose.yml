version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coreflow_api
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Server=db,1433;Database=CoreFlowDb;User Id=sa;Password=Str0ngP@ssw0rd!;TrustServerCertificate=True;"
      Jwt__Issuer: "CoreFlow.Api"
      Jwt__Audience: "CoreFlow.Frontend"
      Jwt__Key: "CoreFlow.Dev.Jwt.Secret.Change.This.Value.2026"
      Jwt__ExpiresMinutes: "60"
    ports:
      - "5088:8080"
    volumes:
      - ./CoreFlow.API/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: coreflow_sql
    environment:
      SA_PASSWORD: "Str0ngP@ssw0rd!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - ./docker/sql:/scripts
    healthcheck:
      test: ["CMD-SHELL","/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      retries: 10

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker/sql:/scripts
    entrypoint: ["/bin/bash","-c","/opt/mssql-tools18/bin/sqlcmd -S db -U sa -P $$SA_PASSWORD -C -i /scripts/init.sql"]
    environment:
      SA_PASSWORD: "Str0ngP@ssw0rd!"
    restart: "no"
